<style>
/*GENERAL RULES*/
*General rules*/
*{box-sizing:border-box;}
 html,body{box-sizing: border-box!important;width: 100%;height: 100%;
    line-height: 1.8;
    color:#000 !important; background-color:#f6f5f4 !important;
    font-size: calc(.6rem + 1vw);
    overflow-x:hidden;
 }
/*end*/

html, body,h4,h5,h6 {font-family: 'Raleway', Arial,  sans-serif;}
h1,h2,h3 {font-family: 'Quicksand' , sans-serif}
h1 {font-weight: 200; font-size: calc(1.2rem + 1vw); padding: 1rem;}

/*HELPER COLOR*/
header {
  background-color: rgb(81, 141, 141);
}

/*ID- styles*/
#tagline {
  margin-bottom: -8rem;
}

/* Create a Parallax Effect */
.bgimg-1, .bgimg-2, .bgimg-3 {
  background-attachment: fixed;
  background-position: center;
  background-repeat: no-repeat;
  background-size: cover;
}

/* First image (Logo. Full height) */
.bgimg-1 {
  background: url("/image/hero-chichago.webp") no-repeat;
  height: 800vh;
  width: 100%;
  object-position: 0% 100%;
}

/* Second image (Portfolio) */
.bgimg-2 {
  background-image: url("/image/sophia-kops.webp");
  min-height: 400px;
}

/* Third image (Contact) */
.bgimg-3 {
  background-image: url("/w3images/parallax3.jpg");
  min-height: 400px;
}

.wide {letter-spacing: .6rem;}
.hover-opacity {cursor: pointer;}



/* Turn off parallax scrolling for tablets and phones */
@media only screen and (max-device-width: 1600px) {
  .bgimg-1, .bgimg-2, .bgimg-3 {
    background-attachment: scroll;
    min-height: 400px;
  }
}



</style>
</head>



<body>
